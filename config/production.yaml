# Agent Payments Skill Configuration

# Skill Metadata
skill:
  name: agentic-payments-bot
  version: 0.5.0

# ── Dry Run Mode ────────────────────────────────────────────────────
# When enabled, no real payments are made. Gateways return stub responses,
# AWS KMS is bypassed, and a local AES-256 key is used for encryption.
dry_run:
  enabled: false
  # Env var holding the 256-bit hex encryption key (64 hex chars).
  # If the var is empty or missing on first run, a key is auto-generated
  # and written to .env in the project root.
  encryption_key_env: "DRYRUN_ENCRYPTION_KEY"
  # Controls stub behaviour: "success" | "failure" | "random"
  stub_mode: "success"
  # Simulated network latency in ms (0 to skip)
  simulated_latency_ms: 500

# SQLite Database Configuration
database:
  path: "./data/payments.db"
  wal_mode: true
  busy_timeout_ms: 5000

# Protocol Configuration
protocols:
  x402:
    enabled: true
    facilitator_url: "https://x402.org/facilitator"
    default_network: "base"
    default_asset: "USDC"
    timeout_ms: 30000
    # Server-side (paywall) configuration
    # When enabled, the web API exposes x402-protected endpoints
    # that external agents can pay to access.
    server:
      enabled: true
      # Wallet address that receives x402 payments (override via X402_PAY_TO_ADDRESS env var)
      pay_to_address: "0x0000000000000000000000000000000000000001"
      # Default price in asset base units (e.g. "1000000" = 1 USDC with 6 decimals)
      default_price: "1000000"
      default_description: "Access to premium agentic data feed"
  ap2:
    enabled: true
    mandate_issuer: "https://your-ap2-issuer.example.com"
    credential_provider_url: "https://credentials.example.com"
    timeout_ms: 30000
    # Server-side (mandate processor) configuration
    # When enabled, the web API exposes AP2 mandate lifecycle endpoints
    # for external agents to submit mandates and trigger payments.
    server:
      enabled: true
      # Agent ID used when this service acts as an AP2 client
      agent_id: "openclaw-payments-agent"

# Web3 Configuration
web3:
  ethereum:
    enabled: true
    rpc_url: "https://mainnet.infura.io/v3/YOUR_PROJECT_ID"
    chain_id: 1
  base:
    enabled: true
    rpc_url: "https://mainnet.base.org"
    chain_id: 8453
  polygon:
    enabled: true
    rpc_url: "https://polygon-rpc.com"
    chain_id: 137

# Web2 Payment Gateways
web2:
  stripe:
    enabled: true
    api_version: "2025-01-27.acacia"

  paypal:
    enabled: true
    environment: "sandbox"   # or "live"
    base_url: "https://api-m.sandbox.paypal.com"

  visa:
    enabled: true
    base_url: "https://sandbox.api.visa.com"

  mastercard:
    enabled: true
    base_url: "https://sandbox.api.mastercard.com"

  googlepay:
    enabled: true
    environment: "TEST"   # "TEST" or "PRODUCTION"
    base_url: "https://pay.google.com/gp/p"
    allowed_card_networks:
      - "AMEX"
      - "DISCOVER"
      - "JCB"
      - "MASTERCARD"
      - "VISA"
    allowed_auth_methods:
      - "PAN_ONLY"
      - "CRYPTOGRAM_3DS"

  applepay:
    enabled: true
    base_url: "https://apple-pay-gateway.apple.com/paymentservices"
    domain: "your-domain.example.com"   # Must be verified with Apple
    display_name: "OpenClaw Payments"
    supported_networks:
      - "visa"
      - "masterCard"
      - "amex"
      - "discover"
    merchant_capabilities:
      - "supports3DS"
      - "supportsCredit"
      - "supportsDebit"

# AWS KMS Configuration (access tokens via env vars only)
kms:
  enabled: true

  # KMS provider selection:
  #   "aws-kms"     — AWS KMS (production cloud). Requires AWS env vars.
  #   "os-keyring"  — OS-native keyring: KDE Wallet / GNOME Keyring (Linux),
  #                    Keychain (macOS), Credential Manager (Windows).
  #                    Uses @aspect-build/keytar. Falls back to local-aes
  #                    on headless systems without D-Bus.
  #   "dbus-secret" — Linux-only: D-Bus Secret Service API via dbus-next
  #                    (pure JS, no native compilation). Works with GNOME
  #                    Keyring and KDE Wallet (Secret Service bridge).
  #                    Falls back to local-aes on headless.
  #   "gpg"         — GnuPG encryption. Ideal for headless Linux servers
  #                    without D-Bus. Requires a GPG keypair.
  #   "local-aes"   — Local AES-256-GCM. Key from DRYRUN_ENCRYPTION_KEY
  #                    env var (auto-generated if missing). No external deps.
  provider: "aws-kms"

  # AWS KMS settings (only used when provider is "aws-kms")
  region: "us-east-1"
  key_id_env: "AWS_KMS_KEY_ID"
  # AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY from environment

  # Linux keyring backend (only used when provider is "os-keyring")
  #   "keytar"    — @aspect-build/keytar (native addon, full cross-platform)
  #   "dbus-next" — Pure JS D-Bus Secret Service client (Linux only)
  linux_keyring_backend: "keytar"

  # GnuPG settings (only used when provider is "gpg")
  # gpg_key_id: "your-gpg-key-fingerprint-or-email@example.com"
  # gpg_binary: "gpg2"         # Path to gpg binary (default: gpg2)

# Policy Engine
policy:
  enabled: true
  rules:
    # Per-transaction limits
    single_transaction:
      max_amount_usd: 1000.00

    # Time-based aggregate limits
    daily:
      max_total_usd: 5000.00
      max_transaction_count: 50
    weekly:
      max_total_usd: 25000.00
      max_transaction_count: 200
    monthly:
      max_total_usd: 80000.00
      max_transaction_count: 500

    # Time-of-day restrictions (UTC)
    time_restrictions:
      enabled: false
      allowed_hours:
        start: 8   # 08:00 UTC
        end: 22    # 22:00 UTC
      allowed_days: [1, 2, 3, 4, 5]   # Mon-Fri

    # Address lists
    whitelist:
      enabled: false
      addresses: []
      # - "0xABCDEF..."

    blacklist:
      enabled: true
      addresses:
        - "0x0000000000000000000000000000000000000000"

    # Currency restrictions
    allowed_currencies:
      - "USDC"
      - "ETH"
      - "USD"
      - "EUR"

  # Human confirmation is always required when policy is violated
  require_human_confirmation_on_violation: true

# Logging & Audit
logging:
  level: "info"   # debug | info | warn | error
  stdout: true
  stderr_errors: true
  file:
    enabled: true
    path: "./logs/payment-skill.log"
    max_size_mb: 50
    max_files: 10
  audit:
    sqlite: true    # Write audit records to SQLite
    verbose: true   # Include request/response payloads

# Web API Configuration
web_api:
  enabled: true
  host: "0.0.0.0"
  port: 3402
  cors_origins:
    - "http://localhost:*"

# CLI Configuration
cli:
  interactive_confirmation: true
  colored_output: true
